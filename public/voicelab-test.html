<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceLab Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .section h2 {
            color: #333;
            font-size: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .icon {
            font-size: 20px;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }
        
        .btn-secondary:hover:not(:disabled) {
            background: #d0d0d0;
        }
        
        .output {
            background: white;
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
            border: 1px solid #ddd;
            max-height: 200px;
            overflow-y: auto;
            font-size: 13px;
            font-family: 'Monaco', 'Courier New', monospace;
            color: #333;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .output.empty {
            color: #999;
            font-style: italic;
        }
        
        .output.error {
            color: #d32f2f;
            background: #ffebee;
            border-color: #ffcdd2;
        }
        
        .output.success {
            color: #388e3c;
            background: #e8f5e9;
            border-color: #c8e6c9;
        }
        
        .audio-player {
            margin-top: 10px;
        }
        
        audio {
            width: 100%;
            max-width: 300px;
            margin-top: 10px;
        }
        
        .status {
            font-size: 12px;
            margin-top: 8px;
            padding: 8px;
            border-radius: 4px;
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .status.recording {
            background: #ffebee;
            color: #d32f2f;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 VoiceLab Test</h1>
        <p class="subtitle">Prueba local de Speech-to-Text → AI Chat → Text-to-Speech</p>
        
        <div class="section">
            <h2><span class="icon">🎙️</span> 1. Speech Recognition (STT)</h2>
            <div class="controls">
                <button class="btn-primary" id="btnStartRecord">Comenzar a grabar</button>
                <button class="btn-secondary" id="btnStopRecord" disabled>Detener grabación</button>
            </div>
            <div class="status" id="recordStatus">Listo</div>
            <div class="output empty" id="transcriptOutput">Esperando grabación...</div>
        </div>
        
        <div class="section">
            <h2><span class="icon">🤖</span> 2. AI Chat (Claude)</h2>
            <div class="controls">
                <button class="btn-primary" id="btnSendToAI" disabled>Enviar a Claude</button>
            </div>
            <div class="output empty" id="aiOutput">Esperando...</div>
        </div>
        
        <div class="section">
            <h2><span class="icon">🔊</span> 3. Text-to-Speech (ElevenLabs)</h2>
            <div class="controls">
                <button class="btn-primary" id="btnGenerateTTS" disabled>Generar audio</button>
            </div>
            <div class="output empty" id="ttsOutput">Esperando...</div>
            <div class="audio-player" id="audioPlayer"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ekchfmncwmrtdahqdhhw.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_7evH8OYknL0fZ-DOp_1TyA_nCRqD-9_';

        let mediaRecorder = null;
        let audioChunks = [];
        let recognizedText = '';
        let aiResponse = '';

        // ── UI Elements ──
        const btnStartRecord = document.getElementById('btnStartRecord');
        const btnStopRecord = document.getElementById('btnStopRecord');
        const recordStatus = document.getElementById('recordStatus');
        const transcriptOutput = document.getElementById('transcriptOutput');
        const btnSendToAI = document.getElementById('btnSendToAI');
        const aiOutput = document.getElementById('aiOutput');
        const btnGenerateTTS = document.getElementById('btnGenerateTTS');
        const ttsOutput = document.getElementById('ttsOutput');
        const audioPlayer = document.getElementById('audioPlayer');

        // ── Speech Recognition Setup ──
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'es-ES';
        recognition.continuous = true;
        recognition.interimResults = true;

        recognition.onstart = () => {
            recordStatus.textContent = '🔴 Grabando...';
            recordStatus.classList.add('recording');
            btnStartRecord.disabled = true;
            btnStopRecord.disabled = false;
            transcriptOutput.textContent = '';
            transcriptOutput.classList.remove('empty', 'error', 'success');
        };

        recognition.onresult = (event) => {
            let interim = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                const transcript = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                    recognizedText += transcript + ' ';
                } else {
                    interim += transcript;
                }
            }
            transcriptOutput.textContent = recognizedText + interim;
            transcriptOutput.classList.remove('empty');
        };

        recognition.onerror = (event) => {
            transcriptOutput.textContent = `❌ Error: ${event.error}`;
            transcriptOutput.classList.add('error');
            recordStatus.textContent = `Error: ${event.error}`;
            recordStatus.classList.remove('recording');
        };

        recognition.onend = () => {
            recordStatus.textContent = '✅ Listo';
            recordStatus.classList.remove('recording');
            btnStartRecord.disabled = false;
            btnStopRecord.disabled = true;
            if (recognizedText.trim()) {
                btnSendToAI.disabled = false;
                transcriptOutput.classList.add('success');
            }
        };

        // ── Button Handlers ──
        btnStartRecord.addEventListener('click', () => {
            recognizedText = '';
            recognition.start();
        });

        btnStopRecord.addEventListener('click', () => {
            recognition.stop();
        });

        btnSendToAI.addEventListener('click', async () => {
            aiOutput.textContent = '⏳ Enviando a Claude...';
            aiOutput.classList.remove('empty', 'error', 'success');
            
            try {
                const response = await fetch(`${SUPABASE_URL}/functions/v1/chat-ai`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                    },
                    body: JSON.stringify({
                        userMessage: recognizedText,
                        context: 'user',
                    }),
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const data = await response.json();
                aiResponse = data.response || JSON.stringify(data);
                aiOutput.textContent = aiResponse;
                aiOutput.classList.add('success');
                btnGenerateTTS.disabled = false;
            } catch (error) {
                aiOutput.textContent = `❌ Error: ${error.message}`;
                aiOutput.classList.add('error');
            }
        });

        btnGenerateTTS.addEventListener('click', async () => {
            ttsOutput.textContent = '⏳ Generando audio...';
            ttsOutput.classList.remove('empty', 'error', 'success');
            
            try {
                const response = await fetch(`${SUPABASE_URL}/functions/v1/text-to-speech`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                    },
                    body: JSON.stringify({
                        text: aiResponse,
                    }),
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const data = await response.json();
                ttsOutput.textContent = `✅ Audio generado (${data.duration?.toFixed(1) || '?'}s)`;
                ttsOutput.classList.add('success');

                // Crear audio player
                const audioBase64 = data.audio;
                const audioBlob = base64ToBlob(audioBase64, 'audio/mpeg');
                const audioUrl = URL.createObjectURL(audioBlob);
                audioPlayer.innerHTML = `<audio controls><source src="${audioUrl}" type="audio/mpeg"></audio>`;
            } catch (error) {
                ttsOutput.textContent = `❌ Error: ${error.message}`;
                ttsOutput.classList.add('error');
            }
        });

        // ── Utilities ──
        function base64ToBlob(base64, type) {
            const byteCharacters = atob(base64);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            return new Blob([new Uint8Array(byteNumbers)], { type });
        }

        // ── Disable AI button if no text ──
        if (!recognizedText.trim()) {
            btnSendToAI.disabled = true;
            btnGenerateTTS.disabled = true;
        }
    </script>
</body>
</html>
